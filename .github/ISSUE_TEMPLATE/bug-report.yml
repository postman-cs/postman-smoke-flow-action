name: Bug Report
description: Report a bug
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Action Version
      description: "The version tag you are using (e.g., v0.11.0 or v0)."
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Runner Platform
      options:
        - Ubuntu (GitHub-hosted)
        - macOS (GitHub-hosted)
        - Windows (GitHub-hosted)
        - Self-hosted
    validations:
      required: true
  - type: dropdown
    id: entry-point
    attributes:
      label: Entry Point
      description: How are you running this action?
      options:
        - GitHub Actions (action.yml)
        - CLI (npm package)
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: Workflow YAML or CLI command that reproduces the issue.
      render: yaml
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
