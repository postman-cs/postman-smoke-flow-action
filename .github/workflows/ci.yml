name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - cs-beta-actions_20260305

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so commitlint can lint the PR commit range.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.11 "$RUNNER_TEMP"
          echo "ACTIONLINT_BIN=$RUNNER_TEMP/actionlint" >> "$GITHUB_ENV"
      # Build once before fan-out so pack tests and the dist check only read dist/.
      - run: npm run build
      # All checks run in parallel on one runner. Failures aggregate under
      # ::group:: logs so one pass shows every result.
      - name: Run gates
        run: |
          set -uo pipefail
          declare -A pid
          run() { local n=$1; shift; ( "$@" ) >"$n.log" 2>&1 & pid[$n]=$!; }

          run lint       npm run lint
          run test       npm test
          run typecheck  npm run typecheck
          run dist       npm run verify:dist:assert
          run actionlint "$ACTIONLINT_BIN"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            run commitlint npx commitlint \
              --from "${{ github.event.pull_request.base.sha }}" \
              --to "${{ github.event.pull_request.head.sha }}"
          fi

          fail=0
          for n in "${!pid[@]}"; do
            if wait "${pid[$n]}"; then echo "gate:$n=pass"; else echo "gate:$n=fail"; fail=1; fi
          done
          for n in "${!pid[@]}"; do
            echo "::group::$n"; cat "$n.log"; echo "::endgroup::"
          done
          exit $fail
      - name: Upload expected dist on mismatch
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: expected-dist
          path: dist/
