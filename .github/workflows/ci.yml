name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - cs-beta-actions_20260305

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so commitlint can lint the PR commit range.
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.11 "$RUNNER_TEMP"
          echo "ACTIONLINT_BIN=$RUNNER_TEMP/actionlint" >> "$GITHUB_ENV"
      # Bundle once before fan-out. Typecheck runs exactly once in the queue.
      - run: npm run bundle
      # Keep at most two checks active on the two-vCPU runner. Failures aggregate
      # under ::group:: logs so one pass still shows every result.
      - name: Run gates
        run: |
          set -uo pipefail
          declare -A pid=()
          declare -A result=()
          declare -a names=()
          MAX_PARALLEL_GATES=2
          finish_one() {
            local finished_pid status n
            if wait -n -p finished_pid "${pid[@]}"; then status=0; else status=$?; fi
            for n in "${!pid[@]}"; do
              if [ "${pid[$n]}" = "$finished_pid" ]; then
                result[$n]=$status
                unset 'pid[$n]'
                return
              fi
            done
          }
          run() {
            while [ "${#pid[@]}" -ge "$MAX_PARALLEL_GATES" ]; do finish_one; done
            local n=$1; shift
            names+=("$n")
            ( "$@" ) >"$n.log" 2>&1 & pid[$n]=$!
          }

          run lint       npm run lint
          run test       npm test
          run typecheck  npm run typecheck
          run dist       npm run verify:dist:assert
          run actionlint "$ACTIONLINT_BIN"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            run commitlint npx commitlint \
              --from "${{ github.event.pull_request.base.sha }}" \
              --to "${{ github.event.pull_request.head.sha }}"
          fi

          while [ "${#pid[@]}" -gt 0 ]; do finish_one; done
          fail=0
          for n in "${names[@]}"; do
            if [ "${result[$n]}" -eq 0 ]; then echo "gate:$n=pass"; else echo "gate:$n=fail"; fail=1; fi
          done
          for n in "${names[@]}"; do
            echo "::group::$n"; cat "$n.log"; echo "::endgroup::"
          done
          exit $fail
      - name: Upload expected dist on mismatch
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: expected-dist
          path: dist/

  windows:
    name: Windows gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run bundle
      - name: Run Windows gates
        shell: pwsh
        run: |
          $commands = @(
            @{ name = 'lint' },
            @{ name = 'test' },
            @{ name = 'typecheck' },
            @{ name = 'dist' }
          )
          $MAX_PARALLEL_GATES = 2
          $running = @()
          $results = @{}
          foreach ($gate in $commands) {
            while ($running.Count -ge $MAX_PARALLEL_GATES) {
              $done = Wait-Job -Job $running -Any
              Receive-Job $done -ErrorAction Continue *>&1 | Out-File "$($done.Name).log"
              $results[$done.Name] = $done.State -eq 'Completed'
              Remove-Job $done; $running = @($running | Where-Object Id -ne $done.Id)
            }
            $running += Start-Job -Name $gate.name -ArgumentList $gate.name -ScriptBlock {
              param($name)
              switch ($name) {
                'lint' { npm run lint }
                'test' { npm test }
                'typecheck' { npm run typecheck }
                'dist' { npm run verify:dist:assert }
              }
              if ($LASTEXITCODE -ne 0) { throw "gate $name failed with exit code $LASTEXITCODE" }
            }
          }
          foreach ($job in $running) { Wait-Job $job | Out-Null; Receive-Job $job -ErrorAction Continue *>&1 | Out-File "$($job.Name).log"; $results[$job.Name] = $job.State -eq 'Completed'; Remove-Job $job }
          $failed = $false
          foreach ($gate in $commands) { if ($results[$gate.name]) { "gate:$($gate.name)=pass" } else { "gate:$($gate.name)=fail"; $failed = $true }; Get-Content "$($gate.name).log" }
          if ($failed) { exit 1 }
