name: Live E2E

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: live-e2e-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  live-e2e:
    name: live e2e gate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Require same-repository PR branch
        if: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          echo "::error::Live e2e runs released action code with repository-scoped live sandbox credentials. Push the branch to this repository (not a fork) to run the required merge gate."
          exit 1
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Wait for postman-actions-e2e PR gate
        env:
          E2E_DISPATCH_TOKEN: ${{ secrets.E2E_DISPATCH_TOKEN }}
          E2E_GATE_ACTION: postman-smoke-flow-action
          E2E_GATE_REF: ${{ github.event.pull_request.head.sha }}
          E2E_GATE_CORRELATION_ID: pr-${{ github.event.pull_request.number }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.event.pull_request.head.sha }}
        run: node .github/scripts/wait-for-e2e-gate.mjs
