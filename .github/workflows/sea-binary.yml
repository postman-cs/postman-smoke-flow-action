name: SEA binary

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Build self-contained SEA binary
        run: bash scripts/build-sea.sh
      - name: Smoke test SEA binary with an empty environment
        # A SEA embeds its runtime and never consults PATH for node, so running it
        # with an empty env and a bogus PATH proves self-containment exactly as a
        # node-less container would -- with no base image to pull (faster, and
        # nothing for the IaC scanner to flag). The CLI always validates inputs, so
        # a clean exit-0 path does not exist; assert it reaches input validation,
        # then assert --version reports the embedded version.
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          BIN="$PWD/build/sea/postman-smoke-flow-${VERSION}-linux-x64"
          out="$(env -i PATH=/nonexistent "$BIN" 2>&1 || true)"
          echo "$out"
          # smoke-flow guards an empty run with the --flow-path acknowledgement
          # message (no "<field> is required"); either proves the binary ran its
          # own code and reached input validation.
          if ! echo "$out" | grep -qE "flow-path|is required|is missing or invalid"; then
            echo "::error::SEA binary did not reach input validation with an empty environment"
            exit 1
          fi
          ver="$(env -i PATH=/nonexistent "$BIN" --version 2>/dev/null || true)"
          echo "--version -> $ver"
          if [ "$ver" != "$VERSION" ]; then
            echo "::error::SEA --version reported '$ver', expected '$VERSION' (version not embedded)"
            exit 1
          fi
          # Hermetic runtime: sea-config.json sets execArgvExtension=none, so the
          # binary must ignore ambient NODE_OPTIONS. A bogus flag node would reject
          # at startup must NOT reach the runtime -- --version still prints cleanly.
          hardened="$(NODE_OPTIONS='--this-flag-does-not-exist' "$BIN" --version 2>/dev/null || true)"
          echo "hardened --version -> $hardened"
          if [ "$hardened" != "$VERSION" ]; then
            echo "::error::SEA honored ambient NODE_OPTIONS; expected execArgvExtension=none to ignore it"
            exit 1
          fi
      - name: Upload SEA binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: postman-smoke-flow-linux-x64
          path: build/sea/postman-smoke-flow-*-linux-x64
          if-no-files-found: error
