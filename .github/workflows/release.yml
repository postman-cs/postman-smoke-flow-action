name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  classify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_kind: ${{ steps.release_tag.outputs.release_kind }}
      npm_publish: ${{ steps.release_tag.outputs.npm_publish }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - id: release_tag
        name: Classify release tag before dependency installation
        run: node scripts/classify-release.mjs

  verify-package:
    needs: classify
    if: ${{ needs.classify.outputs.release_kind == 'immutable' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.11 "$RUNNER_TEMP"
          echo "ACTIONLINT_BIN=$RUNNER_TEMP/actionlint" >> "$GITHUB_ENV"
      - run: npm run bundle
      - name: Run gates
        run: |
          set -uo pipefail
          declare -A pid=() result=(); declare -a names=(); MAX_PARALLEL_GATES=2
          finish_one() { local finished_pid status n; if wait -n -p finished_pid "${pid[@]}"; then status=0; else status=$?; fi; for n in "${!pid[@]}"; do if [ "${pid[$n]}" = "$finished_pid" ]; then result[$n]=$status; unset 'pid[$n]'; return; fi; done; }
          run() { while [ "${#pid[@]}" -ge "$MAX_PARALLEL_GATES" ]; do finish_one; done; local n=$1; shift; names+=("$n"); ( "$@" ) >"$n.log" 2>&1 & pid[$n]=$!; }
          run lint npm run lint; run test npm test; run typecheck npm run typecheck; run dist npm run verify:dist:assert; run actionlint "$ACTIONLINT_BIN"
          while [ "${#pid[@]}" -gt 0 ]; do finish_one; done; fail=0
          for n in "${names[@]}"; do if [ "${result[$n]}" -eq 0 ]; then echo "gate:$n=pass"; else echo "gate:$n=fail"; fail=1; fi; echo "::group::$n"; cat "$n.log"; echo '::endgroup::'; done
          exit $fail
      - name: Build self-contained SEA binary
        run: bash scripts/build-sea.sh
      - name: Smoke test SEA binary with an empty environment
        run: |
          VERSION="$(node -p "require('./package.json').version")"; BIN="$PWD/build/sea/postman-smoke-flow-${VERSION}-linux-x64"
          out="$(env -i PATH=/nonexistent "$BIN" 2>&1 || true)"; echo "$out"
          echo "$out" | grep -qE 'flow-path|is required|is missing or invalid'
          test "$(env -i PATH=/nonexistent "$BIN" --version 2>/dev/null)" = "$VERSION"
          test "$(NODE_OPTIONS='--this-flag-does-not-exist' "$BIN" --version 2>/dev/null)" = "$VERSION"
      - name: Smoke test SEA proxy routing
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          node scripts/assert-sea-proxy.mjs "$PWD/build/sea/postman-smoke-flow-${VERSION}-linux-x64" iapub.postman.co:443 --postman-access-token proxy-smoke-token --project-name proxy-smoke --workspace-id proxy-workspace --spec-id proxy-spec --smoke-collection-id proxy-collection --acknowledge-no-flow-refresh
      - name: Stage release artifacts and manifest
        run: |
          mkdir release-artifacts
          npm pack --pack-destination release-artifacts
          mv release-artifacts/*.tgz release-artifacts/release.tgz
          VERSION="$(node -p "require('./package.json').version")"
          cp "build/sea/postman-smoke-flow-${VERSION}-linux-x64" "build/sea/postman-smoke-flow-${VERSION}-linux-x64.sha256" release-artifacts/
          node -e "const fs=require('fs'),crypto=require('crypto'),p='release-artifacts';const a=fs.readdirSync(p).filter(x=>x!=='release-manifest.json').map(path=>({path,sha256:crypto.createHash('sha256').update(fs.readFileSync(p+'/'+path)).digest('hex')}));fs.writeFileSync(p+'/release-manifest.json',JSON.stringify({schema_version:1,repository:process.env.GITHUB_REPOSITORY,commit_sha:process.env.GITHUB_SHA,tag:process.env.GITHUB_REF_NAME,package_name:require('./package.json').name,package_version:require('./package.json').version,artifacts:a},null,2)+'\\n')"
      - uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            release-artifacts/release.tgz
            release-artifacts/release-manifest.json
            release-artifacts/postman-smoke-flow-*-linux-x64
            release-artifacts/postman-smoke-flow-*-linux-x64.sha256
          if-no-files-found: error

  publish:
    needs: [classify, verify-package]
    if: ${{ needs.classify.outputs.release_kind == 'immutable' && needs.verify-package.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v8
        with:
          name: release-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: .
      - name: Extract artifact-bound verifier
        run: tar -xOf release.tgz package/scripts/verify-release-artifacts.mjs > "$RUNNER_TEMP/verify-release-artifacts.mjs"
      - run: node "$RUNNER_TEMP/verify-release-artifacts.mjs" .
      - name: Publish npm package or verify existing identity
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME=$(node -e "console.log(JSON.parse(require('child_process').execFileSync('tar',['-xOf','release.tgz','package/package.json'],{encoding:'utf8'})).name)")
          PKG_VERSION=$(node -e "console.log(JSON.parse(require('child_process').execFileSync('tar',['-xOf','release.tgz','package/package.json'],{encoding:'utf8'})).version)")
          if EXISTING=$(npm view "$PKG_NAME@$PKG_VERSION" dist.integrity 2>/dev/null); then
            EXISTING="$EXISTING" VERIFIER="$RUNNER_TEMP/verify-release-artifacts.mjs" node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';
          import { pathToFileURL } from 'node:url';
          const { assertNpmSriMatch, computeNpmSri } = await import(pathToFileURL(process.env.VERIFIER).href);
          assertNpmSriMatch(process.env.EXISTING, computeNpmSri(readFileSync('release.tgz')));
          NODE
            echo '::notice::npm version already published with matching integrity'
          else
            npm publish ./release.tgz --provenance --access public
          fi
      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          files: |
            release.tgz
            release-manifest.json
            postman-smoke-flow-*-linux-x64
            postman-smoke-flow-*-linux-x64.sha256

  advance-major-alias:
    needs: [classify, publish]
    if: ${{ needs.classify.outputs.release_kind == 'immutable' && needs.publish.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Advance rolling major alias monotonically
        run: |
          CANDIDATE="${GITHUB_REF_NAME#v}"; MAJOR="v${CANDIDATE%%.*}"
          set +e
          git ls-remote --exit-code --tags origin "refs/tags/$MAJOR" >/dev/null
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            git fetch --depth=1 --no-tags origin "refs/tags/$MAJOR:refs/tags/$MAJOR"
            CURRENT=$(git show "$MAJOR:package.json" | node -p 'JSON.parse(require("fs").readFileSync(0,"utf8")).version')
            if [ "$(printf '%s\n%s\n' "$CURRENT" "$CANDIDATE" | sort -V | tail -n1)" != "$CANDIDATE" ]; then echo '::notice::candidate is older than current alias; not moving alias'; exit 0; fi
          elif [ "$status" -ne 2 ]; then
            echo "::error::failed to probe rolling alias $MAJOR (git ls-remote exit $status)"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "$MAJOR" -m "Rolling $MAJOR alias -> $GITHUB_REF_NAME" "${GITHUB_SHA}^{commit}"
          git push origin "refs/tags/$MAJOR" --force

  dispatch-live-monitor:
    needs: [classify, publish]
    if: ${{ needs.classify.outputs.release_kind == 'immutable' && needs.publish.result == 'success' }}
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Dispatch asynchronous smoke monitor
        env:
          E2E_DISPATCH_TOKEN: ${{ secrets.E2E_DISPATCH_TOKEN }}
          E2E_GATE_SUITE: smoke
          E2E_GATE_REF: ${{ github.ref_name }}
        run: node .github/scripts/dispatch-e2e-monitor.mjs
