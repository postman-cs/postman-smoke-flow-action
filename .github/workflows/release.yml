name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      e2e_failure_injection:
        description: 'Optional monitor-dispatch test hook for maintainers (forwarded to central e2e; does not block publish).'
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      npm_publish: ${{ steps.release_tag.outputs.npm_publish }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run verify:dist
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11
      - name: Run actionlint
        run: |
          ACTIONLINT_BIN="$(go env GOPATH)/bin/actionlint"
          "$ACTIONLINT_BIN"
      - name: Verify release tag matches package version
        id: release_tag
        run: |
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "::error::Release workflow must run from a v* tag; got $GITHUB_REF"
            exit 1
          fi
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH _ <<< "$PKG_VERSION"
          PUBLISH_TAGS=("$PKG_VERSION")
          if [ "${PATCH:-}" = "0" ] && [ -n "${MINOR:-}" ]; then
            PUBLISH_TAGS+=("$MAJOR.$MINOR")
          fi
          for PUBLISH_TAG in "${PUBLISH_TAGS[@]}"; do
            if [ "$TAG_VERSION" = "$PUBLISH_TAG" ]; then
              echo "npm_publish=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          if [ "$TAG_VERSION" = "$MAJOR" ]; then
            echo "npm_publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v$TAG_VERSION is the rolling v1 alias for package version $PKG_VERSION; skipping npm publish and live e2e monitor."
            exit 0
          fi
          if [ "${#PUBLISH_TAGS[@]}" -eq 2 ]; then
            EXPECTED="v${PUBLISH_TAGS[0]}, v${PUBLISH_TAGS[1]}, or v$MAJOR"
          else
            EXPECTED="v${PUBLISH_TAGS[0]} or v$MAJOR"
          fi
          echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION; expected $EXPECTED"
          exit 1

  publish:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Build self-contained SEA binary
        run: bash scripts/build-sea.sh
      - name: Smoke test SEA binary with an empty environment
        # Tag releases do not trigger sea-binary.yml, so smoke the artifact here
        # before any publish/upload -- we never ship a binary we have not executed.
        # A SEA embeds its runtime and never consults PATH for node, so an empty env
        # with a bogus PATH proves self-containment (no base image to pull).
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          BIN="$PWD/build/sea/postman-smoke-flow-${VERSION}-linux-x64"
          out="$(env -i PATH=/nonexistent "$BIN" 2>&1 || true)"
          echo "$out"
          # smoke-flow guards an empty run with the --flow-path acknowledgement
          # message (no "<field> is required"); either proves the binary reached
          # its own input validation.
          if ! echo "$out" | grep -qE "flow-path|is required|is missing or invalid"; then
            echo "::error::SEA binary did not reach input validation with an empty environment"
            exit 1
          fi
          ver="$(env -i PATH=/nonexistent "$BIN" --version 2>/dev/null || true)"
          echo "--version -> $ver"
          if [ "$ver" != "$VERSION" ]; then
            echo "::error::SEA --version reported '$ver', expected '$VERSION' (version not embedded)"
            exit 1
          fi
          # Hermetic runtime: sea-config.json sets execArgvExtension=none, so the
          # binary must ignore ambient NODE_OPTIONS. A bogus flag node would reject
          # at startup must NOT reach the runtime -- --version still prints cleanly.
          hardened="$(NODE_OPTIONS='--this-flag-does-not-exist' "$BIN" --version 2>/dev/null || true)"
          echo "hardened --version -> $hardened"
          if [ "$hardened" != "$VERSION" ]; then
            echo "::error::SEA honored ambient NODE_OPTIONS; expected execArgvExtension=none to ignore it"
            exit 1
          fi
      - name: Smoke test SEA proxy routing
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          BIN="$PWD/build/sea/postman-smoke-flow-${VERSION}-linux-x64"
          node scripts/assert-sea-proxy.mjs "$BIN" iapub.postman.co:443 \
            --postman-access-token proxy-smoke-token \
            --project-name proxy-smoke \
            --workspace-id proxy-workspace \
            --spec-id proxy-spec \
            --smoke-collection-id proxy-collection \
            --acknowledge-no-flow-refresh
      - name: Publish GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
      - name: Check npm package version
        id: npm_package
        if: needs.validate.outputs.npm_publish == 'true'
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$PKG_NAME@$PKG_VERSION is already published; skipping npm publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        if: needs.validate.outputs.npm_publish == 'true' && steps.npm_package.outputs.already_published != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Attach npm tarball to release
        run: |
          npm pack
          mv ./*.tgz release.tgz
      - name: Upload tarball and SEA binary
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            release.tgz
            build/sea/postman-smoke-flow-*-linux-x64
            build/sea/postman-smoke-flow-*-linux-x64.sha256

  advance-major-alias:
    # Keep the rolling major alias (e.g. v2) pointing at the newest published
    # release so consumers pinned to the alias pick it up automatically.
    # GITHUB_TOKEN pushes do not re-trigger workflows, so moving the alias
    # here cannot recurse into another Release run.
    needs:
      - validate
      - publish
    if: ${{ !cancelled() && needs.publish.result == 'success' && needs.validate.outputs.npm_publish == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Force-move rolling major alias tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR="v${VERSION%%.*}"
          if [ "$MAJOR" = "v$VERSION" ]; then
            echo "::notice::Tag $GITHUB_REF_NAME is already a major alias; nothing to move."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          COMMIT="$(git rev-parse "HEAD^{commit}")"
          git tag -fa "$MAJOR" -m "Rolling $MAJOR alias -> $GITHUB_REF_NAME" "$COMMIT"
          git push origin "$MAJOR" --force

  dispatch-live-monitor:
    # After immutable npm publish tags succeed, fire-and-forget a correlated live
    # sandbox run in postman-cs/postman-actions-e2e. This never gates publish;
    # missing/denied tokens fail only this job (continue-on-error).
    needs:
      - validate
      - publish
    if: ${{ needs.validate.outputs.npm_publish == 'true' && needs.publish.result == 'success' }}
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Dispatch postman-actions-e2e live monitor
        env:
          E2E_DISPATCH_TOKEN: ${{ secrets.E2E_DISPATCH_TOKEN }}
          E2E_GATE_FAILURE_INJECTION: ${{ inputs.e2e_failure_injection || '' }}
          E2E_GATE_SUITE: smoke
        run: node .github/scripts/dispatch-e2e-monitor.mjs
