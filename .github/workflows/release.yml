name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      e2e_failure_injection:
        description: 'Internal release-gate test hook. Use pre_live_fail to prove publish is blocked before live e2e work.'
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      npm_publish: ${{ steps.release_tag.outputs.npm_publish }}
      gate_required: ${{ steps.release_tag.outputs.gate_required }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run check:dist
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11
      - name: Run actionlint
        run: |
          ACTIONLINT_BIN="$(go env GOPATH)/bin/actionlint"
          "$ACTIONLINT_BIN"
      - name: Verify release tag matches package version
        id: release_tag
        run: |
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "::error::Release workflow must run from a v* tag; got $GITHUB_REF"
            exit 1
          fi
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH _ <<< "$PKG_VERSION"
          PUBLISH_TAGS=("$PKG_VERSION")
          if [ "${PATCH:-}" = "0" ] && [ -n "${MINOR:-}" ]; then
            PUBLISH_TAGS+=("$MAJOR.$MINOR")
          fi
          for PUBLISH_TAG in "${PUBLISH_TAGS[@]}"; do
            if [ "$TAG_VERSION" = "$PUBLISH_TAG" ]; then
              echo "npm_publish=true" >> "$GITHUB_OUTPUT"
              echo "gate_required=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          if [ "$TAG_VERSION" = "$MAJOR" ]; then
            echo "npm_publish=false" >> "$GITHUB_OUTPUT"
            echo "gate_required=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v$TAG_VERSION is the rolling customer preview alias for package version $PKG_VERSION; skipping npm publish and live e2e gate."
            exit 0
          fi
          if [ "${#PUBLISH_TAGS[@]}" -eq 2 ]; then
            EXPECTED="v${PUBLISH_TAGS[0]}, v${PUBLISH_TAGS[1]}, or v$MAJOR"
          else
            EXPECTED="v${PUBLISH_TAGS[0]} or v$MAJOR"
          fi
          echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION; expected $EXPECTED"
          exit 1

  live-e2e-gate:
    # Covered immutable release tags must pass the central live sandbox e2e before
    # any public artifact (GitHub release, npm package, or tarball upload) is
    # created. The central workflow owns live Postman credentials and serializes
    # sandbox access; this repo only dispatches and waits for the correlated run.
    needs: validate
    if: ${{ needs.validate.outputs.gate_required == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Wait for postman-actions-e2e release gate
        env:
          E2E_DISPATCH_TOKEN: ${{ secrets.E2E_DISPATCH_TOKEN }}
          E2E_GATE_FAILURE_INJECTION: ${{ inputs.e2e_failure_injection || '' }}
        run: node .github/scripts/wait-for-e2e-gate.mjs

  publish:
    needs:
      - validate
      - live-e2e-gate
    if: ${{ always() && needs.validate.result == 'success' && (needs.validate.outputs.gate_required != 'true' || needs.live-e2e-gate.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
      - name: Check npm package version
        id: npm_package
        if: needs.validate.outputs.npm_publish == 'true'
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$PKG_NAME@$PKG_VERSION is already published; skipping npm publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        if: needs.validate.outputs.npm_publish == 'true' && steps.npm_package.outputs.already_published != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Attach npm tarball to release
        run: |
          npm pack
          mv ./*.tgz release.tgz
      - name: Upload tarball
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: release.tgz
